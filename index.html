<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>订阅中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {}
        }
      };
    </script>
  </head>
  <body class="min-h-screen bg-slate-50 font-sans text-slate-900 pb-32">
    <!-- 状态栏模拟 -->
    <div class="flex justify-between items-center p-4 bg-transparent sticky top-0 z-50">
      <button class="p-2 bg-white/50 backdrop-blur rounded-full shadow-sm" type="button" aria-label="返回">
        <i data-lucide="chevron-left" class="w-6 h-6"></i>
      </button>
      <h1 class="text-lg font-bold">订阅中心</h1>
      <div class="w-10"></div>
    </div>

    <!-- 用户信息预览 -->
    <div class="px-6 py-4">
      <div class="flex items-start justify-between gap-4">
        <div class="flex items-center gap-4 min-w-0">
          <div class="w-12 h-12 rounded-full bg-slate-200 border-2 border-white shadow-sm overflow-hidden flex-shrink-0">
            <div class="w-full h-full bg-gradient-to-br from-indigo-500 to-purple-500"></div>
          </div>
          <div class="min-w-0">
            <h2 class="font-bold text-lg italic">塞那银河用户</h2>
            <p class="text-xs text-slate-500">开通会员，立享多项特权</p>
          </div>
        </div>
        <div id="regionTabs" class="flex-shrink-0"></div>
      </div>
    </div>

    <!-- 套餐横向切换导航 -->
    <div
      id="tabsContainer"
      class="overflow-x-auto no-scrollbar flex flex-nowrap gap-4 px-6 py-4 snap-x snap-mandatory"
    ></div>

    <!-- 主展示卡片 -->
    <div class="px-6 mt-2">
      <div id="planCard" class="relative overflow-hidden rounded-3xl p-6 text-white bg-gradient-to-br shadow-xl transition-all duration-500"></div>
    </div>

    <!-- 权益对比（默认收起） -->
    <div id="comparePanelWrap" class="px-6 mt-4 hidden"></div>

    <!-- 价格选择方案 -->
    <div class="px-6 mt-8">
      <div class="flex items-center justify-between mb-4">
        <h4 class="font-bold">时长选择</h4>
        <span class="text-xs text-indigo-600 font-medium">多档套餐可选</span>
      </div>
      <div id="billingOptions" class="overflow-x-hidden no-scrollbar grid grid-cols-2 gap-3 md:flex md:overflow-x-auto"></div>
    </div>

    <!-- 权益卡兑换 -->
    <div class="px-6 mt-6">
      <div
        class="rounded-[2rem] bg-gradient-to-r from-indigo-300 via-indigo-500 to-indigo-900 px-6 py-6 shadow-xl flex items-center justify-between gap-4"
      >
        <div class="min-w-0">
          <p class="text-2xl sm:text-3xl font-black tracking-tight text-white">
            塞那银河<span class="text-amber-300">会员权益卡</span>
          </p>
        </div>
        <button
          id="redeemEntryBtn"
          type="button"
          class="flex-shrink-0 rounded-full bg-gradient-to-r from-amber-100 to-amber-300 px-6 py-3 text-lg font-black text-slate-900 shadow-lg transition-transform hover:scale-105 active:scale-95"
        >
          去兑换
        </button>
      </div>
    </div>

    <!-- 兑换弹窗 -->
    <div
      id="redeemModal"
      class="fixed inset-0 z-[60] hidden items-center justify-center bg-slate-950/45 px-4"
      aria-hidden="true"
    >
      <div
        class="relative w-full max-w-4xl rounded-[2.5rem] bg-gradient-to-br from-slate-100 via-indigo-100 to-indigo-200 p-8 sm:p-10 shadow-2xl"
      >
        <button
          id="redeemCloseBtn"
          type="button"
          aria-label="关闭兑换弹窗"
          class="absolute right-5 top-5 flex h-16 w-16 items-center justify-center rounded-full border-2 border-white/90 text-white transition-transform hover:scale-105"
        >
          <i data-lucide="x" class="h-8 w-8"></i>
        </button>

        <div class="pr-16">
          <h3 class="text-5xl font-black tracking-tight text-slate-900">权益卡兑换</h3>
        </div>

        <div class="mt-12 flex items-center gap-4">
          <input
            id="redeemCodeInput"
            type="text"
            maxlength="8"
            placeholder=""
            class="h-28 flex-1 rounded-[2rem] border-0 bg-white px-8 text-3xl font-semibold tracking-[0.25em] text-slate-900 shadow-inner outline-none placeholder:text-slate-300"
          />
          <button
            id="redeemScanBtn"
            type="button"
            class="flex h-28 w-28 items-center justify-center rounded-[2rem] bg-indigo-400 text-white shadow-lg transition-transform hover:scale-105 active:scale-95"
            aria-label="扫描权益卡"
          >
            <i data-lucide="scan-line" class="h-12 w-12"></i>
          </button>
        </div>

        <div class="mt-10 text-indigo-950">
          <p class="text-3xl font-black">兑换码获取：</p>
          <p class="mt-5 text-3xl leading-relaxed">
            刮开权益卡背面的涂层<br />
            输入8位数兑换码即可开启会员体验
          </p>
        </div>

        <button
          id="redeemSubmitBtn"
          type="button"
          class="mt-10 h-28 w-full rounded-full bg-indigo-400 text-4xl font-black text-white shadow-xl transition-transform hover:scale-[1.01] active:scale-[0.99]"
        >
          兑换
        </button>
      </div>
    </div>

    <!-- 底部购买栏 -->
    <div class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-slate-100 px-6 py-5 flex items-center justify-between shadow-2xl z-50">
      <div class="flex flex-col">
        <div class="flex items-baseline gap-1">
          <span id="bottomPrice" class="text-2xl font-black text-slate-900">¥0</span>
          <span id="bottomUnit" class="text-xs text-slate-500 font-medium">/月</span>
        </div>
        <p class="text-[10px] text-slate-400 mt-1">勾选代表同意《会员协议》</p>
      </div>
      <button
        id="buyBtn"
        type="button"
        class="px-8 py-4 rounded-full font-bold text-white shadow-xl transform active:scale-95 transition-all bg-gradient-to-r"
      >
        立即购买
      </button>
    </div>

    <style>
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      #planCard {
        opacity: 1;
        transition: opacity 300ms ease;
      }
      #planCard.is-fading {
        opacity: 0;
      }
      #redeemModal.is-open {
        display: flex;
      }
    </style>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="./app.js"></script>
  </body>
</html>
